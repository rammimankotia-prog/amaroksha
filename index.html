<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amaroksha Resort and Spa, Himalayas. Coming Soon. Experience luxury in Rishikesh top hills with dense forest and scenic Ganga views.">
    <title>Amaroksha Resort and Spa | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <!-- Background Slideshow with Ken Burns effect -->
    <div class="slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>

    <!-- Gradient Overlay for readability -->
    <div class="overlay"></div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <i class="fa-solid fa-leaf logo-icon"></i>
        <h1 class="title">Amaroksha</h1>
        <h2 class="subtitle">Resort and Spa &bull; Himalayas</h2>
        <h3 class="sub-location">Rishikesh</h3>
        
        <div class="line"></div>
        
        <div class="coming-soon">Coming Soon</div>
        
        <div class="location-box">
            <div class="location-item">
                <i class="fa-solid fa-mountain-sun location-icon"></i>
                <span class="location-text">Rishikesh Top Hills</span>
            </div>
            <div class="location-item">
                <i class="fa-solid fa-water location-icon"></i>
                <span class="location-text">Ganga Scenic View</span>
            </div>
            <div class="location-item">
                <i class="fa-solid fa-tree location-icon"></i>
                <span class="location-text">Dense Forest</span>
            </div>
        </div>
    </div>

    <!-- Footer Partners -->
    <footer class="footer">
        <p>In association with 
            <a href="https://godwinhotels.com/" target="_blank">Godwin Hotels Delhi</a> &amp; 
            <a href="https://grandholidaytours.com/" target="_blank">Grand Holidays</a>
        </p>
    </footer>

</body>
</html>
